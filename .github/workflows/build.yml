name: ZeroOS Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h

      - name: Setup tools
        run: |
          sudo apt update
          sudo apt install -y git curl python3 openjdk-17-jdk build-essential zip unzip rsync bc flex bison libssl-dev
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH
          git config --global user.email "ccnar@zeoros.dev"
          git config --global user.name "ccnar0"

      - name: Init AOSP minimal
        run: |
          mkdir -p ~/aosp
          cd ~/aosp
          repo init -u https://android.googlesource.com/platform/manifest -b android-14.0.0_r1 --depth=1 --partial-clone
          df -h

      - name: Sync core only
        run: |
          cd ~/aosp
          repo sync -c -j4 --no-tags --no-clone-bundle \
            platform/frameworks/base \
            platform/system/core \
            platform/build \
            platform/bionic \
            platform/art
          df -h

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zeoros-aosp
          path: ~/aosp/
          retention-days: 7
