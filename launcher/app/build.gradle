plugins {
    id 'com.android.application'
}

android {
    namespace 'dev.zeoros.launcher'
    compileSdk 34
    defaultConfig {
        applicationId "dev.zeoros.launcher"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "0.1"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
}
